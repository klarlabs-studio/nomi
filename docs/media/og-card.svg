<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#12161b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#9ec1ff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2530" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- accent vertical bar -->
  <rect x="72" y="80" width="4" height="470" fill="url(#accent)" rx="2"/>

  <!-- kicker -->
  <text x="98" y="110" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#8a93a3" letter-spacing="2">
    OPEN SOURCE · APACHE 2.0 · LOCAL-FIRST
  </text>

  <!-- category -->
  <text x="98" y="170" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="22" fill="#8a93a3">
    Local-first AI runtime.
  </text>

  <!-- headline -->
  <text x="98" y="265" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="86" font-weight="700" fill="#e6e9ef">
    Your personal
  </text>
  <text x="98" y="365" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="86" font-weight="700" fill="url(#accent)">
    AI runtime.
  </text>

  <!-- sub -->
  <text x="98" y="430" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="22" fill="#e6e9ef" opacity="0.85">
    A daemon for plans, tools, memory, and any model —
  </text>
  <text x="98" y="462" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="22" fill="#e6e9ef" opacity="0.85">
    designed for inspection before execution.
  </text>

  <!-- audit strip mock -->
  <g transform="translate(98, 510)">
    <rect width="780" height="80" rx="8" fill="#0f1318" stroke="#1f2530"/>
    <text x="18" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#8a93a3" letter-spacing="1.5">AUDIT LOG · LIVE</text>
    <text x="18" y="52" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#e6e9ef">
      <tspan fill="#7aa2f7">✓</tspan> plan.proposed steps=4   <tspan fill="#ffd479">⏸</tspan> step.awaiting_approval cap=filesystem.write
    </text>
    <text x="18" y="70" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#e6e9ef">
      <tspan fill="#7aa2f7">✓</tspan> approval.granted by=user   <tspan fill="#7aa2f7">✓</tspan> step.completed tool=filesystem.write
    </text>
  </g>

  <!-- nomi mark -->
  <g transform="translate(960, 110)">
    <circle cx="40" cy="40" r="40" fill="url(#accent)" opacity="0.18"/>
    <circle cx="40" cy="40" r="28" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="40" y="48" font-family="-apple-system, system-ui, sans-serif" font-size="32" font-weight="700" fill="#e6e9ef" text-anchor="middle">n</text>
    <text x="40" y="115" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#e6e9ef" text-anchor="middle" letter-spacing="2">NOMI</text>
  </g>

  <!-- bottom right wedges -->
  <g transform="translate(900, 530)" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#8a93a3">
    <text x="0" y="0">plan → approve → run</text>
    <text x="0" y="22">capability-gated</text>
    <text x="0" y="44">mnemos memory</text>
  </g>
</svg>
