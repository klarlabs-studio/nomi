name: Mnemos plugin E2E

# End-to-end test of the Mnemos plugin against a running `mnemos serve`
# instance. Exercises each of the 6 tools + the context source so wire-
# format drift between Nomi's tool input parsing and the upstream
# Mnemos API is caught before it lands in main.
#
# Scope:
#   - Build mnemos from the upstream repo (pinned via mnemos-ref input).
#   - Start `mnemos serve` on a free port, in the background.
#   - Run the Go tests gated behind the e2e_mnemos build tag.
#   - Tear down the server after the test sweep.

on:
  push:
    branches: [main]
    paths:
      - 'internal/plugins/mnemos/**'
      - 'cmd/nomid/main.go'
      - '.github/workflows/e2e-mnemos.yml'
  pull_request:
    paths:
      - 'internal/plugins/mnemos/**'
      - 'cmd/nomid/main.go'
      - '.github/workflows/e2e-mnemos.yml'
  workflow_dispatch:
    inputs:
      mnemos-ref:
        description: 'Mnemos git ref to build against (branch / tag / SHA)'
        required: false
        default: 'v0.15.3'

permissions:
  contents: read

jobs:
  e2e:
    name: Mnemos tool calls against real server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Nomi
        uses: actions/checkout@v4
        with:
          path: nomi

      - name: Checkout Mnemos
        uses: actions/checkout@v4
        with:
          repository: felixgeelhaar/mnemos
          path: mnemos
          # workflow_dispatch passes a ref via inputs.mnemos-ref; push +
          # pull_request runs fall back to the pinned default. Using a
          # `||` fallback inside the YAML expression keeps a single step
          # working across all three event types because `inputs` is
          # null on push but the expression coerces cleanly.
          ref: ${{ github.event.inputs.mnemos-ref || 'v0.15.3' }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: nomi/go.sum

      - name: Build mnemos binary
        working-directory: mnemos
        run: |
          go build -o /tmp/mnemos ./cmd/mnemos
          /tmp/mnemos --version || true

      - name: Start mnemos serve in background
        working-directory: mnemos
        run: |
          /tmp/mnemos serve > /tmp/mnemos.log 2>&1 &
          echo "MNEMOS_PID=$!" >> "$GITHUB_ENV"
          # Wait for /health to become responsive (up to 30s).
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:7777/health > /dev/null 2>&1; then
              echo "mnemos serve up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:7777/health

      - name: Issue an E2E bearer token
        run: |
          # Mnemos serve requires a bearer token on write endpoints. The
          # CLI exposes `token issue` against the running server; capture
          # the raw token (last non-empty line of stdout, in case the CLI
          # prints help / banner above it) and feed it to the test
          # process via MNEMOS_E2E_TOKEN.
          set +e
          TOKEN_OUT=$(/tmp/mnemos token issue --subject e2e --visibility team 2>&1)
          TOKEN_RC=$?
          set -e
          echo "$TOKEN_OUT"
          if [ "$TOKEN_RC" -ne 0 ]; then
            echo "token issue failed (rc=$TOKEN_RC); aborting"
            exit 1
          fi
          TOKEN=$(echo "$TOKEN_OUT" | awk 'NF{line=$0} END{print line}')
          if [ -z "$TOKEN" ]; then
            echo "no token in output"
            exit 1
          fi
          echo "MNEMOS_E2E_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "token captured (length=${#TOKEN})"

      - name: "Run E2E test suite (tag: e2e_mnemos)"
        working-directory: nomi
        env:
          MNEMOS_E2E_BASE_URL: http://127.0.0.1:7777
        run: |
          go test -race -count=1 -tags e2e_mnemos -v ./internal/plugins/mnemos/...

      - name: Stop mnemos serve
        if: always()
        run: |
          if [ -n "${MNEMOS_PID:-}" ]; then
            kill "$MNEMOS_PID" || true
          fi
          echo '--- mnemos.log ---'
          tail -n 200 /tmp/mnemos.log || true
