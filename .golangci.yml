# .golangci.yml for nomi (golangci-lint v2). Mirrors the klarlabs-studio
# golden reference. gocritic is part of the org bar — keep it enabled.
# Repo-specific exclusions go under `exclusions.rules`.
version: "2"

run:
  timeout: 5m

linters:
  # Mandatory org bar. gocritic is non-negotiable; gosec covers code-level
  # security alongside the nox scan. gocyclo/dupl are intentionally NOT here
  # — they are noisy and repo-specific.
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
    - gosec
  exclusions:
    rules:
      # Tests legitimately use math/rand (deterministic fixtures, fuzz
      # seeds). G404 weak-RNG does not apply to test code.
      - path: _test\.go
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
