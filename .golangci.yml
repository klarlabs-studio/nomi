# .golangci.yml for nomi (golangci-lint v2). Mirrors the klarlabs-studio
# golden reference. gocritic is part of the org bar — keep it enabled.
# Repo-specific exclusions go under `exclusions.rules`.
version: "2"

run:
  timeout: 5m

linters:
  # Mandatory org bar. gocritic is non-negotiable. Code-level security is
  # owned by nox (taint-analysis plugin + core ruleset), not gosec.
  # gocyclo/dupl are intentionally NOT here — noisy and repo-specific.
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
